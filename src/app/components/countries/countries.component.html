<main class="main-content container-fluid p-4 p-md-5">
  <div class="d-flex justify-content-between align-items-center mb-5">
    <div>
      <h1 class="page-title">إدارة الدول</h1>
      <p class="text-mauted small">إدارة قائمة الدول والعملات المتاحة في النظام</p>
    </div>
<button class="btn btn-add btn-add-responsive shadow-sm px-4 d-flex align-items-center gap-2" (click)="openModal('add')">
  <i class="bi bi-plus-lg"></i>
  <span class="btn-text">إضافة دولة جديدة</span>
</button>
  </div>

  <div class="category-grid">
    <div class="category-item shadow-sm" *ngFor="let cat of countries; let i = index">
      <div class="cat-info">
        <h3>{{cat.name}}</h3>
        <span class="currency-badge"><i class="bi bi-cash me-1"></i> {{cat.currency}}</span>
      </div>
      <div class="cat-actions d-flex gap-2">
        <button class="btn-action edit" (click)="openModal('edit', cat)" title="تعديل">
          <i class="bi bi-pencil-square"></i>
        </button>
        <button class="btn-action delete" (click)="deleteCategory(cat.id, cat.name)" title="حذف">
          <i class="bi bi-trash3"></i>
        </button>
      </div>
    </div>
  </div>
</main>

<div class="custom-modal-overlay" *ngIf="isModalOpen" (click)="closeModal()">
  <div class="custom-modal-content" (click)="$event.stopPropagation()">

    <div class="mobile-drag-handle d-md-none"></div>

    <div class="modal-header-luxury">
      <h3>
        {{ modalMode === 'add' ? 'إضافة دولة جديدة' : 'تعديل بيانات الدولة' }}
        <i class="bi bi-geo-alt-fill me-2 text-primary"></i>
      </h3>
      <button class="btn-close-custom" (click)="closeModal()">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div class="modal-body-luxury">
      <div class="field-wrapper mb-4">
        <label class="form-label">اسم الدولة</label>
        <div class="input-wrapper">
          <input type="text" class="form-input-luxury" [(ngModel)]="catNameModel" placeholder="مثال: المملكة العربية السعودية">
        </div>
      </div>

      <div class="field-wrapper">
        <label class="form-label">رمز العملة</label>
        <div class="input-wrapper">
          <input type="text" class="form-input-luxury" [(ngModel)]="catCurrencyModel" placeholder="مثال: SAR">
        </div>
      </div>
    </div>

    <div class="modal-footer-luxury">
      <button class="btn-cancel-luxury" (click)="closeModal()">إلغاء</button>
      <button class="btn-save-luxury shadow-sm" (click)="saveCategory()" [disabled]="!catNameModel">
        {{ modalMode === 'add' ? 'إضافة الآن' : 'حفظ التعديلات' }}
      </button>
    </div>
  </div>
</div>
