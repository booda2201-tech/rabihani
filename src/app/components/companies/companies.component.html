<div class="companies-wrapper p-4" dir="rtl">
  <div class="page-header d-flex justify-content-between align-items-center mb-5">
    <div class="title-side">
      <h2 class="text-white fw-bold mb-1">إدارة الشركات الشريكة</h2>
      <p class="text-muted">عرض وتعديل بيانات الشركات والـ Tiers الخاصة بهم</p>
    </div>
    <button class="btn-add-company btn-add-company-responsive" (click)="openAddModal()">
      <span class="btn-text"> إضافة شركة جديدة </span>
      <i class="bi bi-plus-circle-fill me-2"></i>
    </button>
  </div>

  <div *ngIf="isLoading()" class="loader-container">
    <div class="spinner-border text-primary"></div>
  </div>

  <div class="row g-4" *ngIf="!isLoading()">
    <div class="col-12 col-md-6 col-lg-4 col-xl-3" *ngFor="let company of companies()">
      <div class="company-card-premium">
        <div class="tier-tag" [attr.data-tier]="company.tierName">
          {{ company.tierName }}
        </div>

        <div class="card-inner">
          <div class="logo-area">
            <div class="logo-glow"></div>
            <img [src]="company.imageUrl" [alt]="company.name" class="img-fluid">
          </div>

          <div class="info-area text-center mt-4">
            <h5 class="company-name text-white fw-bold">{{ company.name }}</h5>
            <div class="points-badge mb-3">
              <i class="bi bi-star-fill me-1"></i>
              {{ company.howToEarnPoints }}
            </div>
            <p class="company-desc text-muted px-2">{{ company.description }}</p>
          </div>

          <div class="actions-area d-flex gap-2 mt-4">
            <button class="btn-action edit w-100" (click)="openEditModal(company)">
              <i class="bi bi-pencil-square"></i> تعديل
            </button>
            <button class="btn-action delete w-100" (click)="onDelete(company.id)">
              <i class="bi bi-trash3"></i> حذف
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>



<div class="custom-modal-overlay" *ngIf="isAddModalOpen" (click)="closeAddModal()">
  <div class="modern-modal-content" (click)="$event.stopPropagation()">
    <button class="close-circle-btn" (click)="closeAddModal()"><i class="bi bi-x"></i></button>
    <div class="modal-header-center"><h3 class="modal-title">إضافة شركة جديدة</h3></div>

    <div class="modal-body-custom">
      <div class="row g-3">
        <div class="col-12">
          <label class="modern-label">اسم الشركة</label>
          <input type="text" class="modern-input" [(ngModel)]="addModel.Name" placeholder="أدخل الاسم">
        </div>
        <div class="col-md-6">
          <label class="modern-label">الدولة</label>
          <select class="modern-input" [(ngModel)]="addModel.CountryId">
            <option class="text-black" *ngFor="let country of countries" [value]="country.id">{{ country.name }}</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="modern-label">المستوى (Tier)</label>
          <select class="modern-input" [(ngModel)]="addModel.Tier">
            <option class="text-black" [value]="1">Bronze</option>
            <option class="text-black" [value]="2">Silver</option>
            <option class="text-black" [value]="3">Gold</option>
            <option class="text-black" [value]="4">Platinum</option>
          </select>
        </div>
        <div class="col-12">
          <label class="modern-label">نظام النقاط</label>
          <input type="text" class="modern-input" [(ngModel)]="addModel.HowToEarnPoints" placeholder="مثال: 10 ريال = نقطة">
        </div>
        <div class="col-12">
          <label class="modern-label">وصف مختصر</label>
          <textarea class="modern-input" rows="2" [(ngModel)]="addModel.Description"></textarea>
        </div>
      </div>

      <div class="image-upload-section mt-2">
        <div class="upload-box-modern w-100" (click)="addFileInput.click()">
          <img *ngIf="imagePreview" [src]="imagePreview" class="preview-img-full">
          <div *ngIf="!imagePreview" class="upload-placeholder">
            <i class="bi bi-camera-fill"></i>
            <span>اضغط لرفع الشعار</span>
          </div>
          <input type="file" #addFileInput hidden (change)="onFileSelected($event)" accept="image/*">
        </div>
      </div>


    </div>

    <div class="modal-footer-modern">
      <button class="btn-main-action" (click)="saveNewCompany()">إضافة للشركات</button>
      <button class="btn-cancel-action" (click)="closeAddModal()">إلغاء</button>
    </div>
  </div>
</div>

<div class="custom-modal-overlay" *ngIf="isEditModalOpen" (click)="closeEditModal()">
  <div class="modern-modal-content edit-mode-gold" (click)="$event.stopPropagation()">
    <button class="close-circle-btn" (click)="closeEditModal()"><i class="bi bi-x"></i></button>

    <div class="modal-header-center">
      <h3 class="modal-title gold-text">تعديل بيانات الشركة</h3>
    </div>

    <div class="modal-body-custom">
      <div class="image-upload-section mb-4">
        <div class="upload-box-modern edit-gold-box w-100 p-1" (click)="editFileInput.click()">
          <img [src]="imagePreview || editModel.imageUrl" class="preview-img-full">
          <div class="edit-overlay-icon"><i class="bi bi-pencil-fill"></i></div>
          <input type="file" #editFileInput hidden (change)="onFileSelected($event)">
        </div>
      </div>

      <div class="row g-3">
        <div class="col-12">
          <label class="modern-label">تعديل الاسم</label>
          <input type="text" class="modern-input focus-gold" [(ngModel)]="editModel.Name">
        </div>

        <div class="col-md-6">
          <label class="modern-label">تعديل نظام النقاط</label>
          <input type="text" class="modern-input focus-gold" [(ngModel)]="editModel.HowToEarnPoints">
        </div>

        <div class="col-md-6">
          <label class="modern-label">تعديل المستوى</label>
          <select class="modern-input focus-gold" [(ngModel)]="editModel.Tier">
            <option [value]="1">Bronze</option>
            <option [value]="2">Silver</option>
            <option [value]="3">Gold</option>
            <option [value]="4">Platinum</option>
          </select>
        </div>
      </div>
    </div>

    <div class="modal-footer-modern">
      <button class="btn-main-action btn-gold-save" (click)="updateCompany()">حفظ التعديلات</button>
      <button class="btn-cancel-action" (click)="closeEditModal()">إلغاء</button>
    </div>
  </div>
</div>
